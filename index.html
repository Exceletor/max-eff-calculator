<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Simulator Ultimate Sync</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #1f2833;
            --accent-green: #66fcf1;
            --accent-blue: #45f3ff;
            --text-light: #c5c6c7;
            --text-muted: #66fcf1;
            --border-color: #2f3e46;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .calculator-card {
            width: 100%;
            max-width: 650px;
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.7);
            border: 1px solid var(--border-color);
        }

        h1 {
            margin-top: 0;
            font-size: 1.6rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            text-align: center;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #fff;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        select, input {
            width: 100%;
            padding: 12px 16px;
            background: #0b0c10;
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .ratio-row {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--accent-blue);
        }

        .item-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
        }

        .item-rates {
            font-size: 0.85rem;
            color: #999;
            margin-top: 4px;
        }

        .machine-type {
            font-size: 0.75rem;
            text-transform: uppercase;
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            color: #ccc;
        }

        .machine-qty {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-blue);
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h1>Factory Simulator Ratio Sync</h1>
    
    <div class="grid-inputs">
        <div>
            <label for="itemSelect">Target Item</label>
            <select id="itemSelect">
                <option value="mechanical_assembly">Mechanical Assembly</option>
                <option value="copper_wire">Copper Wire</option>
                <option value="iron_plate">Iron Plate</option>
            </select>
        </div>
        <div>
            <label for="machineCount">Machines</label>
            <input type="number" id="machineCount" value="1" min="1">
        </div>
    </div>

    <div>
        <h2 style="font-size: 0.9rem; text-transform: uppercase; color: #888;">Required Setup Balance</h2>
        <div id="blueprintOutput"></div>
    </div>
</div>

<script>
    // THE SYNCHRONIZED ENGINE
    // For Processors: provide 'time' (seconds) and 'yield'
    // For Harvesters: provide 'flatRatePerMin' directly (no time)
    const factoryData = {
        mechanical_assembly: {
            name: "Mechanical Assembly",
            machine: "Dual Assembler (Advanced)",
            time: 8,
            yield: 1,
            ingredients: [
                { id: "iron_plate", qty: 2 },
                { id: "copper_wire", qty: 4 }
            ]
        },
        iron_plate: {
            name: "Iron Plate",
            machine: "Press (Normal)",
            time: 5,
            yield: 1,
            ingredients: [{ id: "iron_ingot", qty: 2 }]
        },
        copper_wire: {
            name: "Copper Wire",
            machine: "Extruder (Normal)",
            time: 4,
            yield: 2,
            ingredients: [{ id: "copper_ingot", qty: 1 }]
        },
        iron_ingot: {
            name: "Iron Ingot",
            machine: "Furnace (Normal)",
            time: 3,
            yield: 1,
            ingredients: [{ id: "iron_ore", qty: 1 }]
        },
        copper_ingot: {
            name: "Copper Ingot",
            machine: "Furnace (Normal)",
            time: 3,
            yield: 1,
            ingredients: [{ id: "copper_ore", qty: 1 }]
        },
        // HARVESTERS (No cycle time, just flat output per minute)
        iron_ore: {
            name: "Iron Ore",
            machine: "Iron Mine (Harvester)",
            flatRatePerMin: 30, 
            ingredients: []
        },
        copper_ore: {
            name: "Copper Ore",
            machine: "Copper Mine (Harvester)",
            flatRatePerMin: 30,
            ingredients: []
        }
    };

    const itemSelect = document.getElementById('itemSelect');
    const machineCount = document.getElementById('machineCount');
    const blueprintOutput = document.getElementById('blueprintOutput');

    function calculatePerfectRatios() {
        const targetId = itemSelect.value;
        const finalMachineTarget = parseInt(machineCount.value) || 1;
        const targetRecipe = factoryData[targetId];
        
        if (!targetRecipe) return;

        // Calculate initial items per minute based on whether it's a timed or flat rate machine
        let targetItemsPerMin = 0;
        if (targetRecipe.time) {
            targetItemsPerMin = (60 / targetRecipe.time) * targetRecipe.yield * finalMachineTarget;
        } else {
            targetItemsPerMin = targetRecipe.flatRatePerMin * finalMachineTarget;
        }

        const totals = {};

        function extractRates(id, requiredPerMin) {
            const recipe = factoryData[id];
            if (!recipe) return;

            let exactMachinesNeeded = 0;
            
            // MATH FOR BOTH FORMS:
            if (recipe.time) {
                // Processor math
                const singleMachineOutputPerMin = (60 / recipe.time) * recipe.yield;
                exactMachinesNeeded = requiredPerMin / singleMachineOutputPerMin;
            } else {
                // Harvester math
                exactMachinesNeeded = requiredPerMin / recipe.flatRatePerMin;
            }

            if (!totals[id]) {
                totals[id] = { name: recipe.name, machine: recipe.machine, machines: 0, itemsPerMin: 0 };
            }
            totals[id].machines += exactMachinesNeeded;
            totals[id].itemsPerMin += requiredPerMin;

            if (recipe.ingredients) {
                recipe.ingredients.forEach(ing => {
                    const neededIngRatePerMin = (requiredPerMin / (recipe.yield || 1)) * ing.qty;
                    extractRates(ing.id, neededIngRatePerMin);
                });
            }
        }

        extractRates(targetId, targetItemsPerMin);

        let html = '';
        for (const id in totals) {
            const item = totals[id];
            html += `
                <div class="ratio-row">
                    <div>
                        <span class="item-name">${item.name}</span> <span class="machine-type">${item.machine}</span>
                        <div class="item-rates">Required Flow: ${parseFloat(item.itemsPerMin.toFixed(2))}/min</div>
                    </div>
                    <div>
                        <span class="machine-qty">${parseFloat(item.machines.toFixed(2))}</span>
                    </div>
                </div>
            `;
        }
        blueprintOutput.innerHTML = html;
    }

    itemSelect.addEventListener('change', calculatePerfectRatios);
    machineCount.addEventListener('input', calculatePerfectRatios);
    calculatePerfectRatios();
</script>

</body>
</html>
