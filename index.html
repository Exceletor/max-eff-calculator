<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Sim — Full Chain Viewer</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #1f2833;
            --accent-green: #00e676;
            --accent-yellow: #ffd700;
            --accent-blue: #45f3ff;
            --text-light: #c5c6c7;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .calculator-card {
            width: 100%;
            max-width: 650px;
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.7);
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            font-size: 1.6rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding-bottom: 15px;
            text-align: center;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #fff;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        select, input {
            width: 100%;
            padding: 12px 16px;
            background: #0b0c10;
            border: none;
            color: #fff;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .toggle-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .mode-container {
            display: flex;
            background: #0b0c10;
            border-radius: 6px;
            padding: 4px;
        }

        .mode-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #888;
            padding: 10px;
            font-size: 0.82rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .mode-btn.active.normal-mode {
            background: rgba(255, 215, 0, 0.15);
            color: var(--accent-yellow);
            border: 1px solid var(--accent-yellow);
        }

        .mode-btn.active.advanced-mode {
            background: rgba(0, 230, 118, 0.15);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .mode-btn.active.classic-toggle {
            background: rgba(69, 243, 255, 0.15);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
        }

        .ratio-row {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
        }

        .item-rates {
            font-size: 0.85rem;
            color: #999;
            margin-top: 4px;
        }

        .badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 5px;
        }

        .badge-normal { background: rgba(255, 215, 0, 0.15); color: var(--accent-yellow); border: 1px solid var(--accent-yellow); }
        .badge-advanced { background: rgba(0, 230, 118, 0.15); color: var(--accent-green); border: 1px solid var(--accent-green); }

        .machine-qty {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-blue);
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h1>Factory Sim — Full Chain Viewer</h1>
    
    <div class="grid-inputs">
        <div>
            <label for="itemSelect">Target Item Production</label>
            <select id="itemSelect">
                <!-- Populated dynamically via JS filtering -->
            </select>
        </div>
        <div>
            <label for="targetRate">Output Target (/s)</label>
            <input type="number" id="targetRate" value="1" min="0.1" step="0.1">
        </div>
    </div>

    <div class="toggle-row">
        <div>
            <label>Recipe Context</label>
            <div class="mode-container">
                <button type="button" class="mode-btn active classic-toggle" id="ctxT10" onclick="setRecipeContext('t10')">Tier 10</button>
                <button type="button" class="mode-btn classic-toggle" id="ctxClassic" onclick="setRecipeContext('classic')">Classic</button>
            </div>
        </div>
        <div>
            <label>Machine Setup Tier</label>
            <div class="mode-container">
                <button type="button" class="mode-btn active normal-mode" id="btnNormal" onclick="setGlobalTier('normal')">Norm</button>
                <button type="button" class="mode-btn advanced-mode" id="btnAdvanced" onclick="setGlobalTier('advanced')">Adv</button>
            </div>
        </div>
    </div>

    <div>
        <h2 style="font-size: 0.9rem; text-transform: uppercase; color: #888;">Required Setup Balance</h2>
        <div id="blueprintOutput"></div>
    </div>
</div>

<script>
    // ENGINE MACHINE ARCHITECTURE
    const machineRegistry = {
        cutter: { instant: true, hasTiers: false },
        ore_crusher: { instant: true, hasTiers: false },
        grinder: { instant: true, hasTiers: false },
        laser_cutter: { instant: true, hasTiers: false },
        furnace: { instant: true, hasTiers: false },
        gear_press: { instant: true, hasTiers: false },
        extruder: { instant: true, hasTiers: false },
        rolling_machine: { instant: true, hasTiers: false },
        induction_smelter: { instant: true, hasTiers: false },
        alloy_smelter: { instant: true, hasTiers: false },
        triple_alloy_smelter: { instant: true, hasTiers: false },
        mechanical_mortar: { instant: true, hasTiers: false },
        mixer: { instant: true, hasTiers: false },
        energy_concentrator: { instant: true, hasTiers: false },
        spindle: { instant: true, hasTiers: false },
        
        assembler: { time: 5, hasTiers: true }, 
        dual_assembler: { time: 3.75, hasTiers: true },
        triple_assembler: { time: 6, hasTiers: true }, 
        quad_assembler: { time: 3.75, hasTiers: true },
        quin_assembler: { time: 5, hasTiers: true },
        workstation: { time: 2.86, hasTiers: true },
        form_injector: { time: 1.5, hasTiers: true },
        multiform_injector: { time: 2, hasTiers: true },
        triple_packager: { time: 1, hasTiers: true },
        
        buffer: { time: 0.5, hasTiers: false },
        harvester: { time: 10, hasTiers: true } 
    };

    // ==========================================
    // SEPARATED RECIPE ENGINE (T10 VS CLASSIC)
    // ==========================================
    const factoryData = {
        // --- Tier 10 Chains ---
        stable_banned_soul: {
            name: "Stable Banned Soul",
            group: "t10",
            machine: "mechanical_mortar",
            yield: 1,
            ingredients: [{ id: "banned_soul_shard", qty: 1 }]
        },
        banned_soul_shard: {
            name: "Banned Soul Shard",
            group: "t10",
            machine: "grinder", 
            yield: 3,
            ingredients: [{ id: "banned_soul", qty: 1 }]
        },
        banned_soul: {
            name: "Banned Soul Base",
            group: "t10",
            machine: "harvester",
            yield: 1,
            ingredients: []
        },

        // --- Classic Event / Classic Base Chains ---
        classic_frame: {
            name: "Classic Frame",
            group: "classic",
            machine: "dual_assembler",
            yield: 1,
            ingredients: [
                { id: "classic_iron_plate", qty: 2 },
                { id: "classic_copper_wire", qty: 4 }
            ]
        },
        classic_iron_plate: {
            name: "Iron Plate (Classic)",
            group: "classic",
            machine: "gear_press",
            yield: 1,
            ingredients: [{ id: "classic_iron_ore", qty: 1 }]
        },
        classic_copper_wire: {
            name: "Copper Wire (Classic)",
            group: "classic",
            machine: "extruder",
            yield: 2,
            ingredients: [{ id: "classic_copper_ore", qty: 1 }]
        },
        classic_iron_ore: {
            name: "Iron Ore (Classic)",
            group: "classic",
            machine: "harvester",
            yield: 1,
            ingredients: []
        },
        classic_copper_ore: {
            name: "Copper Ore (Classic)",
            group: "classic",
            machine: "harvester",
            yield: 1,
            ingredients: []
        }
    };
    // ==========================================

    let currentGlobalTier = "normal";
    let currentContext = "t10";

    const itemSelect = document.getElementById('itemSelect');
    const targetRateInput = document.getElementById('targetRate');
    const blueprintOutput = document.getElementById('blueprintOutput');
    const btnNormal = document.getElementById('btnNormal');
    const btnAdvanced = document.getElementById('btnAdvanced');
    const ctxT10 = document.getElementById('ctxT10');
    const ctxClassic = document.getElementById('ctxClassic');

    function populateDropdown() {
        itemSelect.innerHTML = "";
        for (const id in factoryData) {
            if (factoryData[id].group === currentContext) {
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = factoryData[id].name;
                itemSelect.appendChild(opt);
            }
        }
        calculatePerfectRatios();
    }

    function setRecipeContext(context) {
        currentContext = context;
        if(context === 't10') {
            ctxT10.classList.add('active');
            ctxClassic.classList.remove('active');
        } else {
            ctxClassic.classList.add('active');
            ctxT10.classList.remove('active');
        }
        populateDropdown();
    }

    function setGlobalTier(tier) {
        currentGlobalTier = tier;
        if(tier === 'normal') {
            btnNormal.classList.add('active');
            btnAdvanced.classList.remove('active');
        } else {
            btnAdvanced.classList.add('active');
            btnNormal.classList.remove('active');
        }
        calculatePerfectRatios();
    }

    function calculatePerfectRatios() {
        const targetId = itemSelect.value;
        if (!targetId) {
            blueprintOutput.innerHTML = "";
            return;
        }
        const requiredPerSec = parseFloat(targetRateInput.value) || 1;
        
        const totals = {};

        function extractRates(id, rateNeeded) {
            const recipe = factoryData[id];
            if (!recipe) return;

            const mach = machineRegistry[recipe.machine];
            
            if (!totals[id]) {
                totals[id] = { 
                    name: recipe.name, 
                    machineKey: recipe.machine,
                    machProfile: mach,
                    itemsPerSec: 0 
                };
            }
            totals[id].itemsPerSec += rateNeeded;

            if (recipe.ingredients) {
                recipe.ingredients.forEach(ing => {
                    const baseInputNeeded = (rateNeeded / recipe.yield) * ing.qty;
                    extractRates(ing.id, baseInputNeeded);
                });
            }
        }

        extractRates(targetId, requiredPerSec);

        let html = '';
        for (const id in totals) {
            const item = totals[id];
            const mach = item.machProfile;
            
            let badgeHtml = '';
            let finalMachineCount = 0;

            if (mach.instant) {
                finalMachineCount = Math.ceil(item.itemsPerSec / factoryData[id].yield);
            } else {
                const baseOutputPerSec = factoryData[id].yield / mach.time;
                
                if (mach.hasTiers) {
                    const speedModifier = (currentGlobalTier === "advanced") ? 2 : 1;
                    badgeHtml = `<span class="badge badge-${currentGlobalTier}">${currentGlobalTier}</span>`;
                    finalMachineCount = parseFloat((item.itemsPerSec / (baseOutputPerSec * speedModifier)).toFixed(2));
                } else {
                    finalMachineCount = parseFloat((item.itemsPerSec / baseOutputPerSec).toFixed(2));
                }
            }

            html += `
                <div class="ratio-row">
                    <div>
                        <span class="item-name">${item.name}</span> 
                        ${badgeHtml}
                        <div class="item-rates" style="text-transform: capitalize;">Machine: ${item.machineKey.replace(/_/g, ' ')} ➔ ${parseFloat(item.itemsPerSec.toFixed(2))}/s</div>
                    </div>
                    <div>
                        <span class="machine-qty">${finalMachineCount}</span>
                    </div>
                </div>
            `;
        }
        blueprintOutput.innerHTML = html;
    }

    itemSelect.addEventListener('change', calculatePerfectRatios);
    targetRateInput.addEventListener('input', calculatePerfectRatios);
    
    // Initial Load Run
    populateDropdown();
</script>

</body>
</html>
